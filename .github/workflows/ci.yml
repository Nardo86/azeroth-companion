name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  python-tests:
    name: Companion tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit + end-to-end tests
        run: python -m unittest discover -s companion/tests -v

  lua-check:
    name: Lua compile + wire-format interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lupa
        run: pip install lupa
      - name: Compile Lua + round-trip the wire format
        run: python tools/lua_check.py

  luacheck:
    name: luacheck (static analysis, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"
      - uses: leafo/gh-actions-luarocks@v4
      - name: Install luacheck
        run: luarocks install luacheck
      - name: Run luacheck
        run: luacheck addon
